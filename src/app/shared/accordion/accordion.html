<div class="accordion">
  @for (item of items; track item.id) {
    <div class="accordion__item" [class.is-open]="openId() === item.id">
      <button class="accordion__trigger" type="button"
              [attr.aria-expanded]="openId() === item.id"
              [attr.aria-controls]="'acc-' + item.id"
              (click)="toggle(item.id)">
        <span class="accordion__title">{{ item.title }}</span>
        <svg class="accordion__icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="accordion__panel" [id]="'acc-' + item.id" role="region"
           [attr.aria-labelledby]="'acc-btn-' + item.id">
        <div class="accordion__body" [innerHTML]="item.content"></div>
      </div>
    </div>
  }
</div>
