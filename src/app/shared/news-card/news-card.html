<article class="news-card" [attr.aria-labelledby]="'news-' + item.id">
  <div class="news-card__image-wrapper" aria-hidden="true">
    @if (item.image) {
      <img class="news-card__image" [src]="item.image" [alt]="item.title" loading="lazy">
    } @else {
      <div class="news-card__image-placeholder">T</div>
    }
  </div>
  <div class="news-card__body">
    <div class="news-card__meta">
      <span class="news-card__category">{{ categoryLabel() }}</span>
      <time class="news-card__date" [attr.datetime]="item.date">{{ item.date | formatDate }}</time>
    </div>
    <h3 class="news-card__title" [id]="'news-' + item.id">
      <a [routerLink]="item.href" class="news-card__title-link">{{ item.title }}</a>
    </h3>
    <p class="news-card__excerpt">{{ item.excerpt }}</p>
    <a [routerLink]="item.href" class="news-card__link" [attr.aria-label]="'Leer más sobre ' + item.title">Leer más</a>
  </div>
</article>
